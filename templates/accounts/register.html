{% extends "base.html" %}

{% block title %}Register{% endblock %}

{% block content %}

<div class="max-w-xl mx-auto">

    <div class="card bg-base-100 shadow-xl">

        <div class="card-body">

            <h2 class="text-3xl font-bold text-center">

                Create Account

            </h2>

            <form method="post">

                {% csrf_token %}

                {{ form.as_p }}

                <button class="btn btn-primary w-full mt-4">

                    Register

                </button>

            </form>

        </div>

    </div>

</div>

{% endblock %}
