{% extends "base.html" %}

{% block title %}Profile{% endblock %}

{% block content %}

<div class="max-w-2xl mx-auto">

    <div class="card bg-base-100 shadow-xl">

        <div class="card-body">

            <h2 class="text-2xl font-bold">

                My Profile

            </h2>

            <form method="post"
                  enctype="multipart/form-data">

                {% csrf_token %}

                {{ form.as_p }}

                <button class="btn btn-primary mt-4">

                    Update Profile

                </button>

            </form>

        </div>

    </div>

</div>

{% endblock %}
