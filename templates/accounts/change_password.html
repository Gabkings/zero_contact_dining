{% extends "base.html" %}

{% block title %}Change Password{% endblock %}

{% block content %}

<div class="max-w-xl mx-auto">

    <div class="card bg-base-100 shadow">

        <div class="card-body">

            <h2 class="text-2xl font-bold">

                Change Password

            </h2>

            <form method="post">

                {% csrf_token %}

                {{ form.as_p }}

                <button class="btn btn-primary mt-4">

                    Update Password

                </button>

            </form>

        </div>

    </div>

</div>

{% endblock %}
